<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IEC 62443-4-2 FR → CR 매핑 (KS X IEC 62443-4-2:2019 원문 기반)</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --fr1c:#534AB7; --fr1bg:#EEEDFE; --fr1mid:#AFA9EC;
    --fr2c:#0F6E56; --fr2bg:#E1F5EE; --fr2mid:#5DCAA5;
    --fr3c:#185FA5; --fr3bg:#E6F1FB; --fr3mid:#85B7EB;
    --fr4c:#854F0B; --fr4bg:#FAEEDA; --fr4mid:#EF9F27;
    --fr5c:#993C1D; --fr5bg:#FAECE7; --fr5mid:#F0997B;
    --fr6c:#3B6D11; --fr6bg:#EAF3DE; --fr6mid:#97C459;
    --fr7c:#A32D2D; --fr7bg:#FCEBEB; --fr7mid:#F09595;
    --g50:#F6F5F0; --g100:#ECEAE3; --g200:#D3D1C7;
    --g400:#888780; --g600:#5F5E5A; --g800:#444441; --g900:#1a1a18;
  }
  body { font-family:'Noto Sans KR',-apple-system,'Apple SD Gothic Neo',sans-serif; background:var(--g50); min-height:100vh; padding:32px 16px 60px; color:var(--g900); }

  header { max-width:1120px; margin:0 auto 24px; }
  .hdr-top { display:flex; align-items:flex-end; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:14px; }
  .mono { font-family:'IBM Plex Mono','Courier New',monospace; font-size:11px; letter-spacing:.12em; color:var(--g400); text-transform:uppercase; margin-bottom:5px; }
  h1 { font-size:19px; font-weight:700; }
  .sub { font-size:12px; color:var(--g400); margin-top:3px; }

  .search-wrap { position:relative; min-width:180px; max-width:260px; flex:1; }
  .search-wrap input { width:100%; padding:7px 12px 7px 30px; border:1.5px solid var(--g200); border-radius:8px; font-size:13px; background:#fff; color:var(--g900); outline:none; transition:border-color .15s; }
  .search-wrap input:focus { border-color:var(--g400); }
  .search-icon { position:absolute; left:9px; top:50%; transform:translateY(-50%); color:var(--g400); font-size:14px; pointer-events:none; }

  .filter-bar { display:flex; flex-wrap:wrap; gap:6px; align-items:center; margin-bottom:6px; }
  .flabel { font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--g400); margin-right:2px; letter-spacing:.06em; }
  .fbtn { border:1.5px solid var(--g200); border-radius:20px; padding:3px 11px; font-size:12px; font-weight:600; cursor:pointer; background:#fff; color:var(--g600); transition:all .15s; }
  .fbtn:hover { border-color:var(--g400); }
  .fbtn.active { color:#fff; border-color:transparent; }
  .fbtn.all.active { background:var(--g800); }
  .fbtn[data-fr="1"].active{background:var(--fr1c)} .fbtn[data-fr="2"].active{background:var(--fr2c)}
  .fbtn[data-fr="3"].active{background:var(--fr3c)} .fbtn[data-fr="4"].active{background:var(--fr4c)}
  .fbtn[data-fr="5"].active{background:var(--fr5c)} .fbtn[data-fr="6"].active{background:var(--fr6c)}
  .fbtn[data-fr="7"].active{background:var(--fr7c)}
  .slbtn { border:1.5px solid var(--g200); border-radius:6px; padding:3px 9px; font-size:12px; font-weight:600; cursor:pointer; background:#fff; color:var(--g600); transition:all .15s; font-family:'IBM Plex Mono',monospace; }
  .slbtn:hover { border-color:var(--g400); }
  .slbtn.active { background:var(--g800); color:#fff; border-color:var(--g800); }

  .count-bar { max-width:1120px; margin:0 auto 10px; font-size:12px; color:var(--g400); font-family:'IBM Plex Mono',monospace; }
  .count-bar strong { color:var(--g800); }

  .tbl-wrap { max-width:1120px; margin:0 auto; background:#fff; border-radius:12px; border:1px solid var(--g200); overflow:hidden; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  thead th { background:var(--g800); color:#fff; padding:10px 14px; text-align:left; font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; font-family:'IBM Plex Mono',monospace; white-space:nowrap; border-right:1px solid rgba(255,255,255,.08); }
  thead th:last-child { border-right:none; }
  tbody tr { border-bottom:1px solid var(--g100); transition:background .1s; cursor:pointer; }
  tbody tr:last-child { border-bottom:none; }
  tbody tr:hover { background:var(--g50); }
  tbody tr.hidden { display:none; }
  td { padding:9px 14px; vertical-align:middle; }

  .fr-badge { display:inline-flex; align-items:center; gap:5px; padding:3px 8px 3px 6px; border-radius:6px; font-size:11px; font-weight:700; white-space:nowrap; font-family:'IBM Plex Mono',monospace; }
  .fr-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .cr-code { font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:600; padding:2px 7px; border-radius:5px; white-space:nowrap; }
  .cr-name { font-weight:500; color:var(--g900); line-height:1.4; }
  .cr-name-en { font-size:11px; color:var(--g400); margin-top:1px; font-family:'IBM Plex Mono',monospace; }

  .sl-pips { display:flex; gap:3px; }
  .pip { width:22px; height:22px; border-radius:5px; font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; font-family:'IBM Plex Mono',monospace; color:var(--g200); background:var(--g100); }
  .pip.on { color:#fff; }
  .pip.sl1on { background:#AFA9EC; } .pip.sl2on { background:#5DCAA5; }
  .pip.sl3on { background:#EF9F27; } .pip.sl4on { background:#F09595; }

  .re-tag { font-size:10px; font-weight:700; padding:1px 5px; border-radius:3px; font-family:'IBM Plex Mono',monospace; background:#FAEEDA; color:#854F0B; margin-left:4px; }
  .excl-tag { font-size:10px; font-weight:700; padding:1px 5px; border-radius:3px; font-family:'IBM Plex Mono',monospace; background:var(--g100); color:var(--g600); margin-left:4px; }
  .na-tag { font-size:10px; font-weight:700; padding:1px 5px; border-radius:3px; font-family:'IBM Plex Mono',monospace; background:#F1EFE8; color:var(--g400); margin-left:4px; }

  .grp-hdr td { padding:7px 14px; font-size:12px; font-weight:700; border-top:2px solid; background:var(--g50); cursor:default; }
  .grp-hdr:hover { background:var(--g50) !important; }

  .ctype { display:inline-block; font-size:10px; font-weight:600; padding:1px 5px; border-radius:3px; margin:1px 2px 1px 0; font-family:'IBM Plex Mono',monospace; background:var(--g100); color:var(--g600); }
  .ctype.ndr { background:#E6F1FB; color:#185FA5; }
  .ctype.edr { background:#EAF3DE; color:#3B6D11; }
  .ctype.hdr { background:#FAEEDA; color:#854F0B; }
  .ctype.sar { background:#FAECE7; color:#993C1D; }
  .ctype.all { background:var(--g800); color:#fff; }

  .no-results { text-align:center; padding:48px 20px; color:var(--g400); font-size:14px; display:none; }

  /* 모달 */
  .backdrop { display:none; position:fixed; inset:0; background:rgba(26,26,24,.52); z-index:200; align-items:center; justify-content:center; padding:20px; }
  .backdrop.open { display:flex; }
  .modal { background:#fff; border-radius:14px; width:100%; max-width:560px; max-height:86vh; overflow-y:auto; box-shadow:0 24px 60px rgba(0,0,0,.2); animation:mIn .18s ease; }
  @keyframes mIn { from{opacity:0;transform:scale(.96) translateY(6px)} to{opacity:1;transform:none} }
  .mhdr { padding:20px 20px 14px; border-bottom:1px solid var(--g100); display:flex; justify-content:space-between; align-items:flex-start; gap:10px; position:sticky; top:0; background:#fff; border-radius:14px 14px 0 0; z-index:1; }
  .mtag { font-family:'IBM Plex Mono',monospace; font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; margin-bottom:4px; }
  .mtitle { font-size:17px; font-weight:700; line-height:1.3; }
  .men { font-size:11px; color:var(--g400); margin-top:2px; font-family:'IBM Plex Mono',monospace; }
  .mclose { background:var(--g100); border:none; width:30px; height:30px; border-radius:7px; cursor:pointer; font-size:15px; color:var(--g400); flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:background .15s; }
  .mclose:hover { background:var(--g200); }
  .mbdy { padding:18px 20px 26px; }
  .msec { margin-bottom:16px; }
  .msec:last-child { margin-bottom:0; }
  .msec-t { font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--g400); margin-bottom:7px; font-family:'IBM Plex Mono',monospace; }
  .mdesc { font-size:13.5px; line-height:1.75; color:#2C2C2A; }
  .mlist { list-style:none; display:flex; flex-direction:column; gap:6px; }
  .mlist li { font-size:13px; line-height:1.6; color:#3d3d3a; padding-left:14px; position:relative; }
  .mlist li::before { content:"·"; position:absolute; left:0; color:var(--g400); }
  .mtip { background:var(--g50); border-left:3px solid var(--g200); border-radius:0 6px 6px 0; padding:9px 13px; font-size:13px; line-height:1.65; color:var(--g800); }
  .sl-row { display:flex; gap:5px; flex-wrap:wrap; align-items:center; }
  .sl-chip { padding:3px 10px; border-radius:6px; font-size:12px; font-weight:600; font-family:'IBM Plex Mono',monospace; }
  .sl-note { font-size:12px; color:var(--g400); margin-top:5px; }
  .src-note { font-size:11px; color:var(--g400); font-family:'IBM Plex Mono',monospace; background:var(--g50); padding:6px 10px; border-radius:6px; margin-top:12px; }
</style>
</head>
<body>

<header>
  <div class="hdr-top">
    <div>
      <div class="mono">KS X IEC 62443-4-2:2019 원문 기반</div>
      <h1>FR → CR 전체 매핑 테이블</h1>
      <div class="sub">7개 기초 요구사항(FR) · 공통 CR 전체 · SL 적용 범위 · 행 클릭 시 상세 설명</div>
    </div>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="search" placeholder="CR 번호 또는 키워드..." oninput="applyFilters()">
    </div>
  </div>
  <div class="filter-bar">
    <span class="flabel">FR:</span>
    <button class="fbtn all active" onclick="setFR('all')">전체</button>
    <button class="fbtn" data-fr="1" onclick="setFR(1)">FR 1 식별·인증</button>
    <button class="fbtn" data-fr="2" onclick="setFR(2)">FR 2 사용 통제</button>
    <button class="fbtn" data-fr="3" onclick="setFR(3)">FR 3 무결성</button>
    <button class="fbtn" data-fr="4" onclick="setFR(4)">FR 4 기밀성</button>
    <button class="fbtn" data-fr="5" onclick="setFR(5)">FR 5 데이터 흐름</button>
    <button class="fbtn" data-fr="6" onclick="setFR(6)">FR 6 사고 대응</button>
    <button class="fbtn" data-fr="7" onclick="setFR(7)">FR 7 가용성</button>
  </div>
  <div class="filter-bar">
    <span class="flabel">SL:</span>
    <button class="slbtn active" onclick="setSL('all')">전체</button>
    <button class="slbtn" onclick="setSL(1)">SL 1+</button>
    <button class="slbtn" onclick="setSL(2)">SL 2+</button>
    <button class="slbtn" onclick="setSL(3)">SL 3+</button>
    <button class="slbtn" onclick="setSL(4)">SL 4</button>
  </div>
</header>

<div class="count-bar">전체 <strong id="vis-cnt">0</strong>개 CR 표시 중</div>

<div class="tbl-wrap">
  <table id="main-tbl">
    <thead>
      <tr>
        <th style="width:90px">FR</th>
        <th style="width:88px">CR 번호</th>
        <th>명칭</th>
        <th style="width:116px">SL 적용</th>
        <th style="width:60px">RE</th>
        <th style="width:120px">컴포넌트 적용</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="no-results" id="no-res">검색 결과가 없습니다</div>
</div>

<!-- 모달 -->
<div class="backdrop" id="bd" onclick="closeBD(event)">
  <div class="modal">
    <div class="mhdr">
      <div>
        <div class="mtag" id="m-tag"></div>
        <div class="mtitle" id="m-title"></div>
        <div class="men" id="m-en"></div>
      </div>
      <button class="mclose" onclick="closeM()">✕</button>
    </div>
    <div class="mbdy" id="m-bdy"></div>
  </div>
</div>

<script>
/* ─── 원문 데이터 (KS X IEC 62443-4-2:2019 직접 확인) ─────────────────
   sl_min : 이 SL 이상에서 적용 (1=SL1부터, 2=SL2부터, 99=해당없음)
   sl1excl: SL 1에서 "선택 제외"인 경우 true (적용은 SL2~4)
   re     : SL 강화(RE) 여부 및 내용
   ctype  : 'all'=모든컴포넌트, 'ndr'=네트워크장치, 'ndr_only'=NDR전용(공통CR아님), 'na'=해당없음
   ────────────────────────────────────────────────────────────────── */
const CRS = [
  // ── FR 1 ─────────────────────────────────────────────────────────
  { fr:1, cr:"CR 1.1",  name:"인간 사용자 식별 및 인증",           en:"Human user identification and authentication",
    sl:[1,2,3,4], re:"SL2: RE(1) 유일 식별·인증\nSL3: RE(1)(2) 모든 인터페이스 다중 인증", ctype:"all",
    desc:"컴포넌트는 인간 사용자가 접근 가능한 모든 인터페이스에서 사용자를 식별하고 인증하는 역량을 제공해야 한다.",
    detail:["패스워드, 토큰, 생체 인식, 물리적 키 리드 등의 인증 수단 적용","사용자 식별 및 인증은 현장의 비상 조치를 방해하면 안 됨","로컬 및 원격 접속 모두에 적용"],
    tip:"SL 1: 기본 식별·인증 / SL 2: RE(1) 유일 식별·인증 추가 / SL 3·4: RE(1)(2) 모든 인터페이스 다중 인증 추가" },

  { fr:1, cr:"CR 1.2",  name:"소프트웨어 프로세스와 장치의 식별 및 인증", en:"Software process and device identification and authentication",
    sl:[2,3,4], re:"SL3: RE(1) 유일 식별·인증", ctype:"all",
    desc:"컴포넌트는 다른 컴포넌트(소프트웨어 애플리케이션, 임베디드 장치, 호스트 장치, 네트워크 장치)를 자체적으로 식별하고 인증하는 역량을 제공해야 한다.",
    detail:["SL 1에서는 선택 제외","장치 간 인증: 패스워드, 토큰, 위치(물리적·논리적) 방식 사용","그룹 기반 인증도 허용 (공유 계정 또는 공유 대칭키)"],
    tip:"SL 1에서는 요구사항 없음(선택 제외). SL 2부터 적용되며, SL 3에서 유일 식별·인증(RE(1)) 강화." },

  { fr:1, cr:"CR 1.3",  name:"계정 관리",                          en:"Account management",
    sl:[1,2,3,4], re:null, ctype:"all",
    desc:"컴포넌트는 모든 계정의 관리를 직접 지원하거나, 계정을 관리하는 시스템에 통합할 수 있는 역량을 제공해야 한다.",
    detail:["LDAP, Active Directory 등 디렉터리 서비스와의 인증 평가를 위한 통합 지원","자체적으로 계정 관리 역량 제공 가능","SL 1~4 모두 동일 요구사항(강화 없음)"],
    tip:"4가지 SL 모두 동일한 CR 1.3 요구사항 적용. 강화 요구사항(RE) 없음." },

  { fr:1, cr:"CR 1.4",  name:"식별자 관리",                        en:"Identifier management",
    sl:[1,2,3,4], re:null, ctype:"all",
    desc:"컴포넌트는 식별자 관리를 지원하는 시스템으로 통합할 수 있는 역량을 제공 및/또는 식별자 관리를 직접 지원하는 역량을 제공해야 한다.",
    detail:["식별자는 관련 계정과 관련해서 유일하고 모호하지 않아야 함","계정 이름, 유닉스 사용자 ID, 마이크로소프트 윈도우 계정 GUID, X.509 인증서 등","강화 요구사항 없음 (SL 1~4 동일)"],
    tip:"4가지 SL 모두 동일한 CR 1.4 요구사항 적용. 강화 요구사항(RE) 없음." },

  { fr:1, cr:"CR 1.5",  name:"인증자 관리",                        en:"Authenticator management",
    sl:[1,2,3,4], re:"SL3: RE(1) 하드웨어 기반 인증자 보안", ctype:"all",
    desc:"컴포넌트는 a) 초기 인증자 내용의 사용 지원, b) 설치 시 디폴트 인증자 변경 가능, c) 주기적인 인증자 변경/새로고침 지원, d) 저장·사용·전송 중에 인가되지 않은 노출 또는 변경으로부터 인증자 보호 역량을 제공해야 한다.",
    detail:["디폴트 패스워드 변경 강제","패스워드, 토큰, 생체 인식, 물리적 키 카드 등 포함","SL 3 이상: 하드웨어 메커니즘을 통해 중요한 장기 지속 인증자 보호(RE(1))"],
    tip:"SL 1·2: 기본 인증자 관리 / SL 3·4: RE(1) 하드웨어 기반 인증자 보안 추가 (TPM 등)." },

  { fr:1, cr:"CR 1.6",  name:"무선 접근 관리",                     en:"Wireless access management",
    sl:[99], re:null, ctype:"ndr_only",
    desc:"무선 접근 관리 요구사항은 네트워크 컴포넌트 대상이며, 15절의 네트워크 컴포넌트 요구사항(NDR 1.6)에서 설명한다.",
    detail:["공통 CR 아님 — NDR(네트워크 장치 요구사항)에서 별도 정의","NDR 1.6으로 적용됨"],
    tip:"공통 CR이 아닙니다. NDR 전용입니다. 15절 네트워크 장치 요구사항 참조." },

  { fr:1, cr:"CR 1.7",  name:"패스워드 기반 인증 강도",            en:"Strength of password-based authentication",
    sl:[1,2,3,4], re:"SL3: RE(1) 인간 사용자 패스워드 생성 및 사용기간 제한\nSL4: RE(1)(2) 모든 사용자 대상 패스워드 사용기간 제한", ctype:"all",
    desc:"패스워드 기반 인증을 활용하는 컴포넌트는 국제적으로 인지되고 증명된 패스워드 지침에 따라 패스워드 강도 설정을 강제하는 역량을 제공하거나 그러한 시스템으로 통합되어야 한다.",

    const on=row.sl.includes(i);
    s.push(`<div class="pip ${on?SL_CLS[i]:''}">${i}</div>`);
  }
  return `<div class="sl-pips">${s.join('')}</div>`;
}
function ctypeLabel(ctype){
  if(ctype==='all') return '<span class="ctype all">전체</span>';
  if(ctype==='ndr_only') return '<span class="ctype ndr">유형별</span>';
  if(ctype==='na') return '<span style="font-size:11px;color:var(--g400)">없음</span>';
  return ctype;
}

function renderTable(){
  const tbody=document.getElementById('tbody');
  const q=document.getElementById('search').value.toLowerCase();
  tbody.innerHTML='';
  let cnt=0, lastFR=null;
  CRS.forEach((row,idx)=>{
    if(activeFR!=='all' && row.fr!==activeFR) return;
    // SL 필터
    if(activeSL!=='all'){
      if(row.sl.includes(99)||row.sl.length===0) return;
      const minSL=row.sl[0];
      if(minSL>parseInt(activeSL)) return;
    }
    // 검색 필터
    const haystack=(row.cr+row.name+row.en+FR_META[row.fr].name).toLowerCase();
    if(q && !haystack.includes(q)) return;

    const fm=FR_META[row.fr];
    // 그룹 헤더
    if(row.fr!==lastFR && activeFR==='all'){
      const gh=document.createElement('tr');
      gh.className='grp-hdr';
      gh.style.borderTopColor=fm.mid.replace('var(','').replace(')','');
      gh.innerHTML=`<td colspan="6" style="color:${fm.c};background:${fm.bg}">FR ${row.fr} — ${fm.name} <span style="font-family:monospace;font-size:11px;opacity:.7">(${fm.en})</span></td>`;
      tbody.appendChild(gh);
      lastFR=row.fr;
    }
    cnt++;
    const tr=document.createElement('tr');
    tr.setAttribute('data-idx',idx);
    tr.onclick=()=>openModal(idx);
    const reHtml=row.re?`<span class="re-tag">RE</span>`:'';
    const naHtml=(row.sl.includes(99)||row.sl.length===0)?`<span class="excl-tag">N/A</span>`:'';
    tr.innerHTML=`
      <td><span class="fr-badge" style="background:${fm.bg};color:${fm.c}"><span class="fr-dot" style="background:${fm.mid}"></span>FR ${row.fr}</span></td>
      <td><span class="cr-code" style="background:${fm.bg};color:${fm.c}">${row.cr}</span>${naHtml}</td>
      <td><div class="cr-name">${row.name}</div><div class="cr-name-en">${row.en}</div></td>
      <td>${slLabel(row)}</td>
      <td>${reHtml}</td>
      <td>${ctypeLabel(row.ctype)}</td>`;
    tbody.appendChild(tr);
  });
  document.getElementById('vis-cnt').textContent=cnt;
  document.getElementById('no-res').style.display=cnt===0?'block':'none';
}

function setFR(fr){
  activeFR=fr;
  document.querySelectorAll('.fbtn').forEach(b=>{
    b.classList.toggle('active',(fr==='all'&&b.classList.contains('all'))||(fr!=='all'&&parseInt(b.dataset.fr)===fr));
  });
  renderTable();
}
function setSL(sl){
  activeSL=sl;
  document.querySelectorAll('.slbtn').forEach((b,i)=>{
    b.classList.toggle('active',sl==='all'?i===0:i===parseInt(sl));
  });
  renderTable();
}
function applyFilters(){ renderTable(); }

function openModal(idx){
  const row=CRS[idx];
  const fm=FR_META[row.fr];
  document.getElementById('m-tag').textContent=`FR ${row.fr} · ${fm.name} (${fm.en})`;
  document.getElementById('m-tag').style.color=fm.c;
  document.getElementById('m-title').textContent=`${row.cr}  ${row.name}`;
  document.getElementById('m-title').style.color=fm.c;
  document.getElementById('m-en').textContent=row.en;

  let slHtml='<div class="sl-row">';
  if(row.sl.includes(99)||row.sl.length===0){
    slHtml+=`<span class="sl-chip" style="background:var(--g100);color:var(--g600)">컴포넌트 유형별 별도 정의 또는 해당사항 없음</span>`;
  } else {
    for(let s=1;s<=4;s++){
      const on=row.sl.includes(s);
      slHtml+=`<span class="sl-chip" style="${on?`background:${fm.bg};color:${fm.c}`:'background:var(--g100);color:var(--g400)'}">${on?'●':'○'} SL ${s}</span>`;
    }
  }
  slHtml+='</div>';
  if(row.sl[0]&&!row.sl.includes(99)){
    slHtml+=`<div class="sl-note">SL ${row.sl[0]}부터 적용</div>`;
  }
  if(row.re){
    slHtml+=`<div class="sl-note" style="margin-top:5px"><span style="color:#854F0B;font-weight:600">RE(강화 요구사항):</span> ${row.re.replace(/\n/g,'<br>')}</div>`;
  }

  let html=`
    <div class="msec"><div class="msec-t">요구사항 내용</div><div class="mdesc">${row.desc}</div></div>
    <div class="msec"><div class="msec-t">SL 적용 범위</div>${slHtml}</div>
    <div class="msec"><div class="msec-t">세부 내용</div><ul class="mlist">${row.detail.map(d=>`<li>${d}</li>`).join('')}</ul></div>
    <div class="msec"><div class="msec-t">실무 포인트</div><div class="mtip">${row.tip}</div></div>
    <div class="src-note">출처: KS X IEC 62443-4-2:2019 (산업표준심의회, 2025년 8월 14일 개정) — 원문 직접 확인</div>`;
  document.getElementById('m-bdy').innerHTML=html;
  document.getElementById('bd').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeM(){ document.getElementById('bd').classList.remove('open'); document.body.style.overflow=''; }
function closeBD(e){ if(e.target===document.getElementById('bd')) closeM(); }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeM(); });

renderTable();
</script>
</body>
</html>

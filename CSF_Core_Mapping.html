<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIST CSF 2.0 Core — Function · Category · Subcategory 전체 매핑</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gv-c:#7a6e00; --gv-bg:#FEFEE8; --gv-mid:#d4c800;
    --id-c:#185FA5; --id-bg:#E6F1FB; --id-mid:#85B7EB;
    --pr-c:#534AB7; --pr-bg:#EEEDFE; --pr-mid:#AFA9EC;
    --de-c:#854F0B; --de-bg:#FAEEDA; --de-mid:#EF9F27;
    --rs-c:#A32D2D; --rs-bg:#FCEBEB; --rs-mid:#F09595;
    --rc-c:#3B6D11; --rc-bg:#EAF3DE; --rc-mid:#97C459;
    --g50:#F6F5F0; --g100:#ECEAE3; --g200:#D3D1C7;
    --g400:#888780; --g600:#5F5E5A; --g800:#444441; --g900:#1a1a18;
  }
  body { font-family:'Noto Sans KR',-apple-system,'Apple SD Gothic Neo',sans-serif; background:var(--g50); min-height:100vh; padding:32px 16px 60px; color:var(--g900); }

  header { max-width:1160px; margin:0 auto 24px; }
  .hdr-top { display:flex; align-items:flex-end; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:14px; }
  .mono { font-family:'IBM Plex Mono','Courier New',monospace; font-size:11px; letter-spacing:.12em; color:var(--g400); text-transform:uppercase; margin-bottom:5px; }
  h1 { font-size:19px; font-weight:700; }
  .sub { font-size:12px; color:var(--g400); margin-top:3px; }

  .search-wrap { position:relative; min-width:180px; max-width:260px; flex:1; }
  .search-wrap input { width:100%; padding:7px 12px 7px 30px; border:1.5px solid var(--g200); border-radius:8px; font-size:13px; background:#fff; color:var(--g900); outline:none; transition:border-color .15s; }
  .search-wrap input:focus { border-color:var(--g400); }
  .search-icon { position:absolute; left:9px; top:50%; transform:translateY(-50%); color:var(--g400); font-size:14px; pointer-events:none; }

  .filter-bar { display:flex; flex-wrap:wrap; gap:6px; align-items:center; margin-bottom:6px; }
  .flabel { font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--g400); margin-right:2px; letter-spacing:.06em; }
  .fbtn { border:1.5px solid var(--g200); border-radius:20px; padding:3px 11px; font-size:12px; font-weight:600; cursor:pointer; background:#fff; color:var(--g600); transition:all .15s; }
  .fbtn:hover { border-color:var(--g400); }
  .fbtn.active { color:#fff; border-color:transparent; }
  .fbtn.all.active { background:var(--g800); }
  .fbtn[data-fn="GV"].active{background:var(--gv-c)}
  .fbtn[data-fn="ID"].active{background:var(--id-c)}
  .fbtn[data-fn="PR"].active{background:var(--pr-c)}
  .fbtn[data-fn="DE"].active{background:var(--de-c)}
  .fbtn[data-fn="RS"].active{background:var(--rs-c)}
  .fbtn[data-fn="RC"].active{background:var(--rc-c)}

  .count-bar { max-width:1160px; margin:0 auto 10px; font-size:12px; color:var(--g400); font-family:'IBM Plex Mono',monospace; }
  .count-bar strong { color:var(--g800); }

  .tbl-wrap { max-width:1160px; margin:0 auto; background:#fff; border-radius:12px; border:1px solid var(--g200); overflow:hidden; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  thead th { background:var(--g800); color:#fff; padding:10px 14px; text-align:left; font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; font-family:'IBM Plex Mono',monospace; white-space:nowrap; border-right:1px solid rgba(255,255,255,.08); }
  thead th:last-child { border-right:none; }
  tbody tr { border-bottom:1px solid var(--g100); transition:background .1s; cursor:pointer; }
  tbody tr:last-child { border-bottom:none; }
  tbody tr:hover { background:var(--g50); }
  td { padding:9px 14px; vertical-align:middle; }

  .fn-badge { display:inline-flex; align-items:center; gap:5px; padding:3px 8px 3px 6px; border-radius:6px; font-size:11px; font-weight:700; white-space:nowrap; font-family:'IBM Plex Mono',monospace; }
  .fn-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .cat-code { font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:600; padding:2px 7px; border-radius:5px; white-space:nowrap; }
  .sc-code { font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:600; padding:1px 5px; border-radius:4px; white-space:nowrap; margin-right:4px; }
  .sc-name { font-weight:500; color:var(--g900); line-height:1.4; }
  .sc-name-en { font-size:11px; color:var(--g400); margin-top:1px; font-style:italic; }

  .grp-hdr td { padding:7px 14px; font-size:12px; font-weight:700; border-top:2px solid; background:var(--g50); cursor:default; }
  .grp-hdr:hover { background:var(--g50) !important; }

  .no-results { text-align:center; padding:48px 20px; color:var(--g400); font-size:14px; display:none; }

  /* 모달 */
  .backdrop { display:none; position:fixed; inset:0; background:rgba(26,26,24,.52); z-index:200; align-items:center; justify-content:center; padding:20px; }
  .backdrop.open { display:flex; }
  .modal { background:#fff; border-radius:14px; width:100%; max-width:600px; max-height:86vh; overflow-y:auto; box-shadow:0 24px 60px rgba(0,0,0,.2); animation:mIn .18s ease; }
  @keyframes mIn { from{opacity:0;transform:scale(.96) translateY(6px)} to{opacity:1;transform:none} }
  .mhdr { padding:20px 20px 14px; border-bottom:1px solid var(--g100); display:flex; justify-content:space-between; align-items:flex-start; gap:10px; position:sticky; top:0; background:#fff; border-radius:14px 14px 0 0; z-index:1; }
  .mtag { font-family:'IBM Plex Mono',monospace; font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; margin-bottom:4px; }
  .mtitle { font-size:17px; font-weight:700; line-height:1.3; }
  .men { font-size:11px; color:var(--g400); margin-top:2px; font-style:italic; }
  .mclose { background:var(--g100); border:none; width:30px; height:30px; border-radius:7px; cursor:pointer; font-size:15px; color:var(--g400); flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:background .15s; }
  .mclose:hover { background:var(--g200); }
  .mbdy { padding:18px 20px 26px; }
  .msec { margin-bottom:16px; }
  .msec:last-child { margin-bottom:0; }
  .msec-t { font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--g400); margin-bottom:7px; font-family:'IBM Plex Mono',monospace; }
  .mdesc { font-size:13.5px; line-height:1.75; color:#2C2C2A; }
  .mlist { list-style:none; display:flex; flex-direction:column; gap:6px; }
  .mlist li { font-size:13px; line-height:1.6; color:#3d3d3a; padding-left:14px; position:relative; }
  .mlist li::before { content:"·"; position:absolute; left:0; color:var(--g400); }
  .mtip { background:var(--g50); border-left:3px solid var(--g200); border-radius:0 6px 6px 0; padding:9px 13px; font-size:13px; line-height:1.65; color:var(--g800); }
  .src-note { font-size:11px; color:var(--g400); font-family:'IBM Plex Mono',monospace; background:var(--g50); padding:6px 10px; border-radius:6px; margin-top:12px; }
  .fn-chip { display:inline-block; padding:3px 10px; border-radius:6px; font-size:12px; font-weight:600; font-family:'IBM Plex Mono',monospace; margin-bottom:6px; }
  .cat-chip { display:inline-block; padding:2px 8px; border-radius:5px; font-size:12px; font-weight:600; font-family:'IBM Plex Mono',monospace; margin-bottom:4px; }
</style>
</head>
<body>

<header>
  <div class="hdr-top">
    <div>
      <div class="mono">NIST CSWP 29 · February 26, 2024 · Appendix A</div>
      <h1>CSF 2.0 Core — Function · Category · Subcategory 전체 매핑</h1>
      <div class="sub">6개 Function · 22개 Category · 106개 Subcategory · 행 클릭 시 상세 설명</div>
    </div>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="search" placeholder="ID, 카테고리, 키워드..." oninput="applyFilters()">

  </div>
  <div class="filter-bar">
    <span class="flabel">Function:</span>
    <button class="fbtn all active" onclick="setFN('all')">전체</button>
    <button class="fbtn" data-fn="GV" onclick="setFN('GV')">🟡 GOVERN</button>

  </div>
</header>

<div class="count-bar">전체 <strong id="vis-cnt">0</strong>개 Subcategory 표시 중</div>

<div class="tbl-wrap">
  <table id="main-tbl">
    <thead>
      <tr>
        <th style="width:90px">Function</th>
        <th style="width:100px">Category</th>
        <th style="width:110px">Subcategory ID</th>
        <th>내용 (한국어)</th>
        <th style="width:180px">영문 원문 (요약)</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="no-results" id="no-res">검색 결과가 없습니다</div>
</div>

<div class="backdrop" id="bd" onclick="closeBD(event)">
  <div class="modal">
    <div class="mhdr">
      <div>
        <div class="mtag" id="m-tag"></div>
        <div class="mtitle" id="m-title"></div>
        <div class="men" id="m-en"></div>
      </div>
      <button class="mclose" onclick="closeM()">✕</button>
    </div>
    <div class="mbdy" id="m-bdy"></div>
  </div>
</div>

  ID:{emoji:"🔵",name:"IDENTIFY",name_kr:"식별",desc:"조직의 현재 사이버보안 리스크가 이해됨",c:"var(--id-c)",bg:"var(--id-bg)",mid:"var(--id-mid)"},

};

const SCS = [
  // GOVERN
  {fn:"GV",cat:"GV.OC",id:"GV.OC-01",kr:"조직의 임무가 이해되고 사이버보안 리스크 관리에 반영됨",en:"Organizational mission informs cybersecurity risk management",tip:"임무(Mission) 이해가 사이버보안 활동 우선순위의 출발점"},
  {fn:"GV",cat:"GV.OC",id:"GV.OC-02",kr:"내·외부 이해관계자의 필요와 기대가 이해되고 사이버보안 리스크 관리에 고려됨",en:"Stakeholder needs and expectations understood and considered",tip:"이해관계자 범위: 이사회·임원·규제기관·고객·공급자 등 포함"},
  {fn:"GV",cat:"GV.OC",id:"GV.OC-03",kr:"사이버보안 관련 법적·규제적·계약적 요구사항(프라이버시 및 시민 자유 포함)이 이해되고 관리됨",en:"Legal, regulatory, and contractual cybersecurity requirements understood",tip:"법령·규정·계약·SLA 등 외부 의무사항 전체를 포괄"},

  {fn:"GV",cat:"GV.OC",id:"GV.OC-05",kr:"조직이 의존하는 결과·역량·서비스가 이해되고 커뮤니케이션됨",en:"Outcomes and services the organization depends on communicated",tip:"조직의 내부 의존성(인프라·공급자·서비스) 파악"},

let activeFN = 'all';

function getColors(fn) {
  const m = FN_META[fn];
  return { c: m.c, bg: m.bg, mid: m.mid };
}

function renderTable() {
  const tbody = document.getElementById('tbody');
  const q = document.getElementById('search').value.toLowerCase();
  tbody.innerHTML = '';
  let cnt = 0, lastCat = null;

  SCS.forEach((row, idx) => {
    if (activeFN !== 'all' && row.fn !== activeFN) return;
    const haystack = (row.id + row.kr + row.en + row.cat + row.fn).toLowerCase();
    if (q && !haystack.includes(q)) return;

    const fm = FN_META[row.fn];
    const cm = CAT_META[row.cat];

    // 카테고리 그룹 헤더
    if (row.cat !== lastCat) {
      const gh = document.createElement('tr');
      gh.className = 'grp-hdr';
      gh.style.borderTopColor = fm.mid.replace(/var\((.*)\)/, (_, v) => getComputedStyle(document.documentElement).getPropertyValue(v).trim() || '#ccc');
      gh.innerHTML = `<td colspan="5" style="background:${fm.bg};color:${fm.c}">
        <span style="font-family:monospace;font-size:11px;margin-right:8px">${row.cat}</span>
        ${cm.name_kr} <span style="font-family:monospace;font-size:11px;opacity:.6;margin-left:6px">${cm.name}</span>
      </td>`;
      tbody.appendChild(gh);
      lastCat = row.cat;
    }

    cnt++;
    const tr = document.createElement('tr');
    tr.setAttribute('data-idx', idx);
    tr.onclick = () => openModal(idx);
    tr.innerHTML = `
      <td><span class="fn-badge" style="background:${fm.bg};color:${fm.c}">
        <span class="fn-dot" style="background:${fm.mid}"></span>${row.fn}
      </span></td>
      <td><span class="cat-code" style="background:${fm.bg};color:${fm.c}">${row.cat}</span></td>
      <td><span class="sc-code" style="background:${fm.bg};color:${fm.c}">${row.id}</span></td>
      <td><div class="sc-name">${row.kr}</div></td>
      <td><div class="sc-name-en">${row.en}</div></td>`;
    tbody.appendChild(tr);
  });

  document.getElementById('vis-cnt').textContent = cnt;
  document.getElementById('no-res').style.display = cnt === 0 ? 'block' : 'none';
}

function setFN(fn) {
  activeFN = fn;
  document.querySelectorAll('.fbtn').forEach(b => {
    b.classList.toggle('active',
      (fn === 'all' && b.classList.contains('all')) ||
      (fn !== 'all' && b.dataset.fn === fn)
    );
  });
  renderTable();
}

function applyFilters() { renderTable(); }

function openModal(idx) {
  const row = SCS[idx];
  const fm = FN_META[row.fn];
  const cm = CAT_META[row.cat];

  document.getElementById('m-tag').textContent = `${row.fn} — ${fm.name_kr} (${fm.name})`;
  document.getElementById('m-tag').style.color = fm.c;
  document.getElementById('m-title').textContent = `${row.id}`;
  document.getElementById('m-title').style.color = fm.c;
  document.getElementById('m-en').textContent = row.en;

  const html = `
    <div class="msec">
      <div class="msec-t">Function</div>
      <span class="fn-chip" style="background:${fm.bg};color:${fm.c}">${fm.emoji} ${fm.name} (${fm.name_kr})</span>
      <div style="font-size:13px;color:var(--g600);margin-top:6px">${fm.desc}</div>
    </div>
    <div class="msec">
      <div class="msec-t">Category</div>
      <span class="cat-chip" style="background:${fm.bg};color:${fm.c}">${row.cat}</span>
      <span style="font-size:13px;color:var(--g800);margin-left:6px">${cm.name_kr}</span>
      <div style="font-size:11px;color:var(--g400);margin-top:3px;font-style:italic">${cm.name}</div>
    </div>
    <div class="msec">
      <div class="msec-t">Subcategory 결과 (한국어)</div>
      <div class="mdesc">${row.kr}</div>
    </div>
    <div class="msec">
      <div class="msec-t">Subcategory Outcome (영문 원문)</div>
      <div class="mdesc" style="font-style:italic;color:var(--g600)">${row.en}</div>
    </div>
    <div class="msec">
      <div class="msec-t">실무 포인트</div>
      <div class="mtip">${row.tip}</div>
    </div>
    <div class="src-note">출처: NIST CSWP 29 — The NIST Cybersecurity Framework (CSF) 2.0, Appendix A (February 26, 2024)</div>`;

  document.getElementById('m-bdy').innerHTML = html;
  document.getElementById('bd').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeM() { document.getElementById('bd').classList.remove('open'); document.body.style.overflow = ''; }
function closeBD(e) { if (e.target === document.getElementById('bd')) closeM(); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeM(); });

renderTable();
</script>
